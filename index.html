<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Sync</title>
    <link rel="stylesheet" href="Style/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>StudySync</h1>
        <button id="themeToggleBtn">Dark Mode</button>
      </header>
      <main class="dashboard">
        <section class="todo-section">
          <h2>To Do</h2>
          <div class="input">
            <input type="text" id="task" placeholder="Enter Your Task" />
            <button class="addtask">Add Task</button>
          </div>
          <div class="filter-sec">
            <button class="filter" data-filter="all">All</button>
            <button class="filter" data-filter="completed">Completed</button>
            <button class="filter" data-filter="pending">Pending</button>
          </div>
          <ul id="tasklist"></ul>
        </section>

        <section class="timer-section">
          <h2>Pomodoro Timer</h2>
          <div class="timer-container">
            <h2 id="timerDisplay">25 : 00</h2>
            <div class="timer-input">
              <input
                type="number"
                id="minutesInput"
                placeholder="Minutes"
                min="1"
              />
            </div>
            <div class="timer-buttons">
              <button id="startBtn">Start</button>
              <button id="pauseBtn">Pause</button>
              <button id="resetBtn">Reset</button>
            </div>
          </div>
        </section>

        <section class="tracker-section">
          <h2>Daily Study Tracker</h2>
          <div class="tracker-container">
            <input
              type="number"
              id="studyHoursInput"
              placeholder="Enter Study Hours"
              min="0"
            />
            <button id="addStudyHoursBtn">Add hours</button>
            <div class="study-info">
              <p>Total study hours : <span id="totalHours">0</span></p>
            </div>

            <div class="progress-bar-container">
              <div id="progressBar"></div>
            </div>
            <p id="progressText">0%</p>
          </div>
        </section>

        <section class="notes-section">
          <h2>Notes</h2>
          <div class="notes-input-section">
            <textarea id="noteInput" placeholder="Write your note ..">
            </textarea>
            <button id="addNoteBtn">Add Note</button>
          </div>
          <div id="notesContainer"></div>
        </section>
      </main>
    </div>
  </body>
  <script type="module" src="./js/app.js"></script>
</html>
